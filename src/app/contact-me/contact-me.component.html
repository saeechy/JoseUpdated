<div class="bg"></div>
<div class="bg bg2"></div>

<div class="container my-5 fade-in">
  <figure class="text-center my-5">
    <h1 class="display-3 playfair-display-sc-bold">Contact Information</h1>
  </figure>

  <div class="row justify-content-center align-items-start g-5">
    <div class="col-lg-6">
      <section>
        <div class="card shadow" style="border-radius: 15px;">
          <div class="card-body p-4">

            <h1 class="mb-4 text-center playfair-display-sc-bold">Work with me!</h1>

            <!-- Minimal success / error alerts -->
            <div *ngIf="sent" class="alert alert-success py-2 text-center" role="alert">
              Message sent
            </div>
            <div *ngIf="errorMsg" class="alert alert-danger py-2 text-center" role="alert">
              {{ errorMsg }}
            </div>

            <form (ngSubmit)="submitForm()">
              <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control form-control-lg"
                       [(ngModel)]="formData.name" name="name" required />
              </div>

              <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control form-control-lg"
                       [(ngModel)]="formData.email" name="email" required />
              </div>

              <div class="mb-3">
                <label class="form-label">Message</label>
                <textarea rows="4" class="form-control"
                          [(ngModel)]="formData.message" name="message" required></textarea>
              </div>

              <div class="text-center">
                <button type="submit" class="btn btn-outline-dark btn-lg px-5" [disabled]="sending">
                  {{ sending ? 'Sending...' : 'Submit' }}
                </button>
              </div>
            </form>

          </div>
        </div>
      </section>
    </div>

    <div class="col-lg-6 d-flex flex-column gap-4">

      <div class="card shadow border-0 rounded-4">
        <div class="card-body d-flex align-items-center gap-4 ps-4">
          <i class="fa-solid fa-envelope fa-2x text-dark"></i>
          <div>
            <h5 class="mb-1">Email</h5>
            <p class="mb-1 text-muted">jb1289716&#64;gmail.com</p>
            <a href="mailto:jb1289716@gmail.com" class="btn btn-sm btn-outline-dark">Send Email</a>
          </div>
        </div>
      </div>

      <div class="card shadow border-0 rounded-4">
        <div class="card-body d-flex align-items-center gap-4 ps-4">
          <i class="fa-solid fa-phone fa-2x text-dark"></i>
          <div>
            <h5 class="mb-1">Phone</h5>
            <p class="mb-1 text-muted">+63 945 607 5477</p>
            <a href="tel:+639456075477" class="btn btn-sm btn-outline-dark">Call Now</a>
          </div>
        </div>
      </div>

      <div class="card shadow border-0 rounded-4">
        <div class="card-body d-flex align-items-center gap-4 ps-4">
          <i class="fa-brands fa-facebook fa-2x text-dark"></i>
          <div>
            <h5 class="mb-1">Facebook</h5>
            <p class="mb-1 text-muted">facebook.com/Jose.Reyes.899</p>
            <a href="https://facebook.com/Jose.Reyes.899" class="btn btn-sm btn-outline-dark">Visit Profile</a>
          </div>
        </div>
      </div>

      <div class="card shadow border-0 rounded-4">
        <div class="card-body d-flex align-items-center gap-4 ps-4">
          <i class="fa-brands fa-github fa-2x text-dark"></i>
          <div>
            <h5 class="mb-1">GitHub</h5>
            <p class="mb-1 text-muted">github.com/saeechy</p>
            <a href="https://github.com/saeechy" class="btn btn-sm btn-outline-dark">View Projects</a>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
